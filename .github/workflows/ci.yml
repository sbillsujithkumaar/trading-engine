name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Grant Gradle permissions
        run: chmod +x gradlew

      - name: Run Gradle build + tests
        run: ./gradlew clean test

  # Publish immutable SHA images only for main-branch pushes.
  # The prod tag is retained as a bootstrap fallback for fresh EC2 nodes.
  publish-image:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t trading-engine:${{ github.sha }} .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push SHA and prod tags to ECR
        run: |
          IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/trading-engine"
          docker tag trading-engine:${{ github.sha }} ${IMAGE}:${{ github.sha }}
          docker tag trading-engine:${{ github.sha }} ${IMAGE}:prod
          docker push ${IMAGE}:${{ github.sha }}
          docker push ${IMAGE}:prod

  deploy:
    runs-on: ubuntu-latest
    needs: publish-image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Pin live deployment to tested SHA
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export KUBECONFIG=/home/ec2-user/.kube/config
            /usr/local/bin/kubectl set image deployment/trading-engine \
              trading-engine=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/trading-engine:${{ github.sha }}

      - name: Wait for rollout to complete
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export KUBECONFIG=/home/ec2-user/.kube/config
            /usr/local/bin/kubectl rollout status deployment/trading-engine --timeout=180s
