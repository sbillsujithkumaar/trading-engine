name: CI/CD

# Triggers: run on every push or PR to main
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # JOB 1: Build, test, and push to ECR
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Grant Gradle permissions
        run: chmod +x gradlew

      - name: Run Gradle build + tests
        run: ./gradlew clean test

      # Builds the Docker image using a multi-stage Dockerfile:
      #   Stage 1 (JDK): compiles the Java source code with Gradle
      #   Stage 2 (JRE): copies only the compiled output into a lean runtime image
      # The final image only contains the JRE and the compiled app — not the compiler
      # or build tools — keeping the image size small (~200MB vs ~500MB with JDK)
      #
      # Tagged with the git commit SHA so every build is uniquely identifiable
      # and traceable back to the exact commit that produced it
      - name: Build Docker image
        run: docker build -t trading-engine:${{ github.sha }} .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image to ECR with SHA tag
        run: |
          docker tag trading-engine:${{ github.sha }} ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/trading-engine:${{ github.sha }}
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/trading-engine:${{ github.sha }}

  # JOB 2: Promote SHA image to :prod and deploy to EC2
  # No checkout needed — this job only talks to AWS and EC2
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      # Gives GitHub Actions permission to talk to AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Authenticates Docker with ECR so we can pull and retag images
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Retags the SHA image as :prod in ECR — no rebuild needed
      # This promotes the exact image that passed CI to production
      # The SHA tag is preserved so we can always trace :prod back to its commit
      - name: Promote SHA image to :prod in ECR
        run: |
          docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/trading-engine:${{ github.sha }}
          docker tag ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/trading-engine:${{ github.sha }} ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/trading-engine:prod
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/trading-engine:prod

      # Forces k3s to create a new pod regardless of whether image URI changed
      # kubectl rollout restart adds a timestamp annotation to the pod spec
      # triggering a new pod which pulls fresh :prod from ECR via imagePullPolicy: Always
      # No docker login or docker pull needed on EC2 — ECR credential provider
      # handles authentication automatically via IAM role
      # KUBECONFIG exported explicitly — appleboy/ssh-action uses non-login shell
      # so .bashrc is not sourced and KUBECONFIG would not be set otherwise
      # /usr/local/bin/kubectl used for maximum robustness — avoids PATH issues
      - name: Restart k3s deployment to pull latest image
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: export KUBECONFIG=/home/ec2-user/.kube/config && /usr/local/bin/kubectl rollout restart deployment/trading-engine

      # Blocks until the new pod passes liveness + readiness probes
      # --timeout=180s gives the pod 3 minutes to become healthy
      # If it never becomes healthy, this step fails and pipeline goes red
      - name: Wait for rollout to complete
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: export KUBECONFIG=/home/ec2-user/.kube/config && /usr/local/bin/kubectl rollout status deployment/trading-engine --timeout=180s