# Kubernetes Deployment for Trading Engine
# This deployment configuration defines a single replica of the trading engine application.
# It uses the "trading-engine:prod" Docker image, which should be built and pushed to a container registry before applying this deployment.
# The application listens on port 8080 and uses a Persistent Volume Claim for data storage. Liveness and readiness probes are configured to ensure the application is healthy and ready to serve traffic.   
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-engine
spec:
  replicas: 1
  strategy:
    # Recreate ensures only one pod owns the volume at a time
    # RollingUpdate would cause volume conflicts since both old and new pods would run simultaneously
    type: Recreate
  selector:
    matchLabels:
      app: trading-engine
  template:
    metadata:
      labels:
        app: trading-engine
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: trading-engine
          # Previously trading-engine:prod (local image built manually on EC2)
          # Now points to ECR so k3s pulls the image from the registry automatically
          # This means no manual docker build on EC2 is needed — CI/CD handles everything
          image: 020880439584.dkr.ecr.eu-north-1.amazonaws.com/trading-engine:prod
          imagePullPolicy: Always
          ports:
            - containerPort: 8080

          env:
            - name: PORT
              value: "8080"
            - name: DATA_DIR
              value: "/data"

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          volumeMounts:
            - name: engine-data
              mountPath: /data

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5

          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 3

      volumes:
        - name: engine-data
          persistentVolumeClaim:
            claimName: trading-engine-pvc
