# PersistentVolumeClaim — requests storage from the local-storage class
# Binds to trading-engine-pv which points to /mnt/trading-data (EBS volume)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: trading-engine-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-storage
  resources:
    requests:
      storage: 9Gi
